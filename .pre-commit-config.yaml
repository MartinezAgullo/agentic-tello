# Pre-commit hooks for the agentic-tello project.
# Install once:  uv run pre-commit install
# Run on demand: uv run pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      # Lint with autofix (config in pyproject.toml [tool.ruff]).
      # The formatter is intentionally NOT enabled here — it conflicts with the
      # project's deliberate compact one-line/semicolon style. Run it manually
      # (`uv run ruff format`) if you want it.
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]  # block accidentally-committed model weights, etc.
